name: GHDL CI

on:
  push:
  pull_request:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GHDL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ghdl

      - name: Run simulation
        run: make -C sim
